<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Reservation System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background: #003366;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 700px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h2 {
            color: #003366;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .ticket {
            margin-top: 20px;
            background: #e9f7ef;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid green;
        }

        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<header>
    <h1>ONLINE TRAIN RESERVATION SYSTEM</h1>
</header>

<div class="container">

    <!-- Login -->
    <div class="card">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <p id="loginMessage"></p>
    </div>

    <!-- Reservation Form -->
    <div class="card">
        <h2>Reservation Form</h2>

        <input type="text" id="name" placeholder="Passenger Name">

        <input type="text" id="trainNumber" placeholder="Train Number">

        <input type="text" id="trainName" placeholder="Train Name">

        <select id="classType">
            <option>First Class</option>
            <option>Second Class</option>
            <option>Sleeper</option>
            <option>AC</option>
        </select>

        <input type="date" id="journeyDate">

        <input type="text" id="from" placeholder="From">

        <input type="text" id="to" placeholder="To">

        <button onclick="reserveTicket()">Reserve Ticket</button>

        <div id="ticket"></div>
    </div>

    <!-- Cancellation -->
    <div class="card">
        <h2>Cancel Ticket</h2>

        <input type="number" id="cancelPNR" placeholder="Enter PNR Number">

        <button onclick="cancelTicket()">Cancel Ticket</button>

        <p id="cancelMessage"></p>
    </div>

</div>

<footer>
    <p>© 2026 Train Reservation System</p>
</footer>

<script>

    // LOGIN FUNCTION
    function login() {

        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        if(username === "admin" && password === "1234") {

            document.getElementById("loginMessage").innerHTML =
            "✅ Login Successful";

        } else {

            document.getElementById("loginMessage").innerHTML =
            "❌ Invalid Username or Password";

        }
    }

    // RESERVATION FUNCTION
    function reserveTicket() {

        let name = document.getElementById("name").value;
        let trainNumber = document.getElementById("trainNumber").value;
        let trainName = document.getElementById("trainName").value;
        let classType = document.getElementById("classType").value;
        let date = document.getElementById("journeyDate").value;
        let from = document.getElementById("from").value;
        let to = document.getElementById("to").value;

        let pnr = Math.floor(Math.random() * 1000000);

        document.getElementById("ticket").innerHTML = `

            <div class="ticket">

                <h3>🎫 Ticket Reserved Successfully</h3>

                <p><strong>PNR Number:</strong> ${pnr}</p>

                <p><strong>Name:</strong> ${name}</p>

                <p><strong>Train Number:</strong> ${trainNumber}</p>

                <p><strong>Train Name:</strong> ${trainName}</p>

                <p><strong>Class:</strong> ${classType}</p>

                <p><strong>Date:</strong> ${date}</p>

                <p><strong>From:</strong> ${from}</p>

                <p><strong>To:</strong> ${to}</p>

            </div>

        `;
    }

    // CANCEL FUNCTION
    function cancelTicket() {

        let pnr = document.getElementById("cancelPNR").value;

        if(pnr === "") {

            document.getElementById("cancelMessage").innerHTML =
            "❌ Please Enter PNR Number";

        } else {

            document.getElementById("cancelMessage").innerHTML =
            "✅ Ticket Cancelled Successfully for PNR: " + pnr;

        }
    }

</script>

</body>
</html>
